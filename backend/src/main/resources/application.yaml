ktor:
  application:
    modules:
      - app.ApplicationKt.module
  deployment:
    port: 8081

app:
  name: family-messenger-backend
  version: 0.1.0
  database:
    host: localhost
    port: 5432
    name: family_messenger
    user: family
    password: family
    driver: org.postgresql.Driver
    bootstrapSchema: true
    seedOnStart: true
  auth:
    tokenTtlHours: 720
  rateLimit:
    enabled: true
    authWindowSeconds: 60
    authMaxRequestsPerWindow: 10
